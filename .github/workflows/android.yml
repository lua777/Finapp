name: Gerar APK Kotlin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar o Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin' # Alterado para uma distribuicao mais estavel no GitHub
        java-version: '17'

    - name: Validar e corrigir permissao do Gradle
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
        else
          echo "Aviso: gradlew nao encontrado na raiz. Tentando encontrar..."
          find . -name gradlew -exec chmod +x {} \;
        fi

    - name: Compilar APK de Debug
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug
        else
          # Se o projeto estiver dentro de uma subpasta, isso resolve:
          SUBPASTA=$(find . -name gradlew -exec dirname {} \;)
          cd $SUBPASTA
          ./gradlew assembleDebug
        fi

    - name: Procurar e Subir o APK pronto
      uses: actions/upload-artifact@v4
      with:
        name: finapp-debug-apk
        path: "**/build/outputs/apk/debug/*.apk" # Busca o APK onde quer que ele tenha sido gerado
