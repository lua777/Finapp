name: Gerar APK Kotlin

on:
  workflow_dispatch: # Permite que você clique em um botão para gerar o APK quando quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar o Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Dar permissao ao Gradle
      run: chmod +x ./gradlew

    - name: Compilar APK de Debug
      run: ./gradlew assembleDebug

    - name: Subir o APK pronto
      uses: actions/upload-artifact@v4
      with:
        name: finapp-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        
